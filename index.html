<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>חדר מצב – קיבוץ שריד</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    direction: rtl;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(145deg, #0d3d3d 0%, #0a2e3d 50%, #0d3347 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 0.75rem;
  }

  .header {
    text-align: center;
    margin-bottom: 1rem;
  }
  .header h1 { font-size: 20px; font-weight: 800; color: white; margin-bottom: 4px; letter-spacing: -0.5px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.55); }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 560px;
  }

  .card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 0.85rem 0.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .card .icon { font-size: 26px; }
  .card .card-title {
    font-size: 15px;
    font-weight: 700;
    color: white;
    text-align: center;
    line-height: 1.3;
  }

  .btn-form {
    width: 100%;
    background: #0e7490;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: block;
    text-align: center;
    min-height: 42px;
    line-height: 1.3;
    transition: background 0.15s;
  }
  .btn-form:active { background: #0c6478; transform: scale(0.98); }

  .btn-sheet {
    width: 100%;
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 8px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 38px;
    transition: all 0.15s;
  }
  .btn-sheet:active { background: rgba(255,255,255,0.08); }
  .btn-sheet .sheet-icon { font-size: 16px; }

  .btn-row { display: flex; gap: 6px; width: 100%; }
  .btn-row .btn-form { flex: 1; }
  .btn-row .btn-sheet { flex: 1; }
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 2px 0;
  }

  .footer {
    margin-top: 0.75rem;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }

  @media (max-width: 500px) {
    .cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="Sarid100Logo.png" alt="קיבוץ שריד 100" style="width:120px; max-width:40vw; margin-bottom:0.5rem;">
  <h1>חדר מצב – קיבוץ שריד</h1>
  <a href="dashboard.html" style="display:inline-block; margin-top:10px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:9px 20px; color:white; font-size:13px; font-weight:800; text-decoration:none; letter-spacing:0.08em;">📊 HAMAL DASHBOARD</a>
  
</div>

<div class="cards">

  <!-- Form 1 -->
  <div class="card">
    <div class="icon">🏠</div>
    <div class="card-title">דיווח מצב דירה</div>
        <div class="divider"></div>
    <div class="btn-row">
      <a class="btn-form" href="form1.html" target="_blank">פתח טופס</a>
      <a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1AHwAXrVt62_vVGH-0uYBvFDcHmSC2CzM6K0ErXBYAag/edit?gid=1807813251#gid=1807813251" target="_blank">
        <span class="sheet-icon">📊</span> נתונים
      </a>
    </div>
  </div>

  <!-- Form 2 -->
  <div class="card">
    <div class="icon">🚑</div>
    <div class="card-title">מיפוי פצועים</div>
        <div class="divider"></div>
    <div class="btn-row">
      <a class="btn-form" href="form2.html" target="_blank">פתח טופס</a>
      <a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1xfp9BXdofyqHmC4ElYkHmN-b0tnqVVXiSaySrUxv8Xk/edit?gid=1379797226#gid=1379797226" target="_blank">
        <span class="sheet-icon">📊</span> נתונים
      </a>
    </div>
  </div>

  <!-- Form 3 -->
  <div class="card">
    <div class="icon">📋</div>
    <div class="card-title">מעקב מס"ר</div>
        <div class="divider"></div>
    <div class="btn-row">
      <a class="btn-form" href="form3.html" target="_blank">פתח טופס</a>
      <a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1RdHXUl4PK7mdgyd8cOotUd8obFQVtDSuCoUTZsichdY/edit?gid=1835725583#gid=1835725583" target="_blank">
        <span class="sheet-icon">📊</span> נתונים
      </a>
    </div>
  </div>
</div>


<div class="footer">קיבוץ שריד • מערכת חירום<br>לתמיכה: רביב לויטה</div>

</body>
</html>
