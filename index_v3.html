<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>חדר מצב – קיבוץ שריד</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    direction: rtl;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #1a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header .logo { font-size: 48px; margin-bottom: 0.5rem; }
  .header h1 { font-size: 26px; font-weight: 800; color: white; margin-bottom: 6px; letter-spacing: -0.5px; }
  .header p { font-size: 14px; color: rgba(255,255,255,0.55); }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 560px;
  }

  .card {
    background: #2a0f0f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 1.4rem 1.1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .card .icon { font-size: 36px; }
  .card .card-title {
    font-size: 15px;
    font-weight: 700;
    color: white;
    text-align: center;
    line-height: 1.3;
  }

  .btn-form {
    width: 100%;
    background: #b91c1c;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 13px 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: block;
    text-align: center;
    min-height: 50px;
    line-height: 1.3;
    transition: background 0.15s;
  }
  .btn-form:active { background: #991b1b; transform: scale(0.98); }

  .btn-sheet {
    width: 100%;
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 11px 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 46px;
    transition: all 0.15s;
  }
  .btn-sheet:active { background: rgba(255,255,255,0.08); }
  .btn-sheet .sheet-icon { font-size: 16px; }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 4px 0;
  }

  .footer {
    margin-top: 2rem;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }

  @media (max-width: 380px) {
    .cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️</div>
  <h1>חדר מצב – קיבוץ שריד</h1>
  <p>בחר טופס לדיווח</p>
</div>

<div class="cards">

  <!-- Form 1 -->
  <div class="card">
    <div class="icon">🏠</div>
    <div class="card-title">דיווח מצב דירה</div>
    <div class="divider"></div>
    <a class="btn-form" href="form1.html">פתח טופס</a>
    <a class="btn-sheet"
       href="https://docs.google.com/spreadsheets/d/1AHwAXrVt62_vVGH-0uYBvFDcHmSC2CzM6K0ErXBYAag/edit?gid=1807813251#gid=1807813251"
       target="_blank">
      <span class="sheet-icon">📊</span> צפה בנתונים
    </a>
  </div>

  <!-- Form 2 -->
  <div class="card">
    <div class="icon">🚑</div>
    <div class="card-title">מיפוי פצועים</div>
    <div class="divider"></div>
    <a class="btn-form" href="form2.html">פתח טופס</a>
    <a class="btn-sheet"
       href="https://docs.google.com/spreadsheets/d/1xfp9BXdofyqHmC4ElYkHmN-b0tnqVVXiSaySrUxv8Xk/edit?gid=1379797226#gid=1379797226"
       target="_blank">
      <span class="sheet-icon">📊</span> צפה בנתונים
    </a>
  </div>

</div>

<div class="footer">קיבוץ שריד • מערכת חירום<br>לתמיכה: רביב לויטה</div>

</body>
</html>
