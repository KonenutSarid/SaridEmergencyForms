<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>דיווח חירום – קיבוץ שריד</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { direction: rtl; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
  .form-root { max-width: 600px; margin: 0 auto; padding: 1rem; }
  .form-header { background: #8B0000; color: white; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .form-header h1 { font-size: 19px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .form-header p { font-size: 13px; opacity: 0.85; }
  .card { background: white; border: 0.5px solid #e0e0e0; border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 0.85rem; }
  .card-title { font-size: 12px; font-weight: 700; color: #888; margin-bottom: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .field { margin-bottom: 0.85rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 14px; font-weight: 600; color: #222; margin-bottom: 6px; }
  .field label .req { color: #8B0000; margin-right: 2px; }
  .field input, .field textarea, .field select {
    width: 100%; border: 1.5px solid #ddd; border-radius: 10px;
    padding: 12px 14px; font-size: 16px; font-family: inherit;
    background: #fafafa; color: #222; direction: rtl;
    -webkit-appearance: none; appearance: none; min-height: 48px;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: #8B0000; background: white;
    box-shadow: 0 0 0 3px rgba(139,0,0,0.1);
  }
  .field textarea { resize: none; min-height: 90px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #888; font-size: 14px; }
  .select-wrap select { padding-left: 30px; }
  .building-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .status-option {
    border: 2px solid #ddd; border-radius: 12px; padding: 14px 10px;
    text-align: center; cursor: pointer; font-size: 14px; font-weight: 600;
    color: #444; line-height: 1.4; transition: all 0.15s;
    min-height: 68px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    user-select: none; background: #fafafa;
  }
  .status-option .icon { font-size: 22px; }
  .status-option.selected-cleared { background: #f0fdf4; border-color: #16a34a; color: #15803d; }
  .status-option.selected-notcleared { background: #fff1f1; border-color: #8B0000; color: #8B0000; }
  .tenant-row { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .tenant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tenant-num { font-size: 13px; font-weight: 700; color: #666; }
  .remove-btn { background: none; border: 1px solid #ddd; color: #888; cursor: pointer; font-size: 13px; padding: 5px 12px; border-radius: 8px; min-height: 34px; font-family: inherit; }
  .remove-btn:active { background: #fff1f1; border-color: #8B0000; color: #8B0000; }
  .tenant-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .add-btn {
    width: 100%; border: 2px dashed #ccc; background: none; border-radius: 12px;
    padding: 14px; font-size: 15px; color: #888; cursor: pointer;
    font-family: inherit; min-height: 52px; font-weight: 600; margin-top: 4px;
  }
  .add-btn:active { background: #f5f5f5; }
  .submit-btn {
    width: 100%; background: #8B0000; color: white; border: none;
    border-radius: 14px; padding: 17px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 0.5rem;
    min-height: 58px; letter-spacing: 0.01em;
  }
  .submit-btn:active { background: #6b0000; transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.55; }
  .success-banner {
    background: #f0fdf4; border: 2px solid #16a34a; color: #15803d;
    border-radius: 12px; padding: 1.1rem; text-align: center;
    font-size: 16px; font-weight: 700; display: none;
    margin-bottom: 1rem; line-height: 1.6;
  }
  .error-banner {
    background: #fff1f1; border: 2px solid #8B0000; color: #8B0000;
    border-radius: 12px; padding: 1rem; text-align: center;
    font-size: 14px; display: none; margin-bottom: 1rem;
  }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 380px) {
    .row2, .tenant-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="form-root" dir="rtl">

      <div class="setup-banner" id="setupBanner">
    <p>👋 ברוך הבא! הכנס את שמך כדי שיופיע אוטומטית:</p>
    <input type="text" id="setupName" placeholder="שם מלא">
    <button onclick="saveHandlerName()">שמור והמשך</button>
  </div>

  <div class="form-header">
    <h1>🚨 דיווח מצב בניין ודיירים</h1>
    <p>קיבוץ שריד &nbsp;•&nbsp; טופס חירום</p>
  </div>

  <div class="success-banner" id="successBanner">
    ✅ הדיווח נשלח בהצלחה!<br>
    <span style="font-size:14px;font-weight:400;">תודה רבה. הנתונים נשמרו בגיליון.</span>
  </div>
  <div class="error-banner" id="errorBanner">
    ❌ שגיאה בשליחה. בדוק חיבור אינטרנט ונסה שוב.
  </div>

  <div class="card">
    <div class="card-title">פרטי הבניין</div>
    <div class="row2">
      <div class="field">
        <label><span class="req">*</span> שם משפחה</label>
        <input type="text" id="familyName" placeholder="שם משפחה" autocomplete="family-name">
      </div>
      <div class="field">
        <label><span class="req">*</span> כתובת / מס׳ בניין</label>
        <input type="text" id="address" placeholder="כתובת / מספר">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">מצב הבניין</div>
    <div class="building-status">
      <div class="status-option" id="opt-cleared" onclick="selectBuilding('cleared')">
        <span class="icon">✅</span>בוצעה סריקה
      </div>
      <div class="status-option" id="opt-notcleared" onclick="selectBuilding('notcleared')">
        <span class="icon">⚠️</span>טרם נוסק
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">דיירים <span style="font-size:11px;font-weight:400;color:#aaa">(חובה — לפחות אחד)</span></div>
    <div id="tenantsList"></div>
    <button class="add-btn" onclick="addTenant()">＋ הוסף דייר</button>
  </div>

  <div class="card">
    <div class="card-title">הערות (אופציונלי)</div>
    <div class="field">
      <textarea id="notes" placeholder="מידע נוסף, הערות חשובות..."></textarea>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">שלח דיווח</button>
  <div style="height:2rem"></div>

</div>

<!-- Hidden iframe used to submit form without CORS issues -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none"></iframe>
<form id="hidden_form" method="POST" target="hidden_iframe" style="display:none">
  <input type="hidden" name="timestamp"     id="f_timestamp">
  <input type="hidden" name="familyName"    id="f_familyName">
  <input type="hidden" name="address"       id="f_address">
  <input type="hidden" name="buildingStatus"id="f_buildingStatus">
  <input type="hidden" name="tenants"       id="f_tenants">
  <input type="hidden" name="notes"         id="f_notes">
  <input type="hidden" name="handler"       id="f_handler">
</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqFbzT6odHcQ_7UXBBPcUaRMz14_TJiI7zzz-KKwaMi4rmJdRBa5fw-xnT55lFkTRo/exec";

const STATUSES = [
  { value: "not_present", label: "לא נוכח" },
  { value: "safe",        label: "בטוח" },
  { value: "injured",     label: "פצוע" },
  { value: "missing",     label: "נעדר" },
  { value: "trapped",     label: "לכוד" },
];
const STATUS_LABELS = Object.fromEntries(STATUSES.map(s => [s.value, s.label]));

let tenantCount = 0;
let buildingStatusVal = "";

function selectBuilding(val) {
  buildingStatusVal = val;
  document.getElementById("opt-cleared").className    = "status-option" + (val === "cleared"    ? " selected-cleared"    : "");
  document.getElementById("opt-notcleared").className = "status-option" + (val === "notcleared" ? " selected-notcleared" : "");
}

function addTenant() {
  tenantCount++;
  const id = tenantCount;
  const list = document.getElementById("tenantsList");
  const div = document.createElement("div");
  div.className = "tenant-row";
  div.id = "tenant-" + id;
  const opts = STATUSES.map(s => `<option value="${s.value}">${s.label}</option>`).join("");
  div.innerHTML = `
    <div class="tenant-header">
      <span class="tenant-num">דייר ${id}</span>
      <button class="remove-btn" onclick="removeTenant(${id})">הסר</button>
    </div>
    <div class="tenant-inner">
      <div class="field" style="margin-bottom:0">
        <label>שם</label>
        <input type="text" id="tname-${id}" placeholder="שם מלא">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>סטטוס</label>
        <div class="select-wrap">
          <select id="tstatus-${id}">${opts}</select>
        </div>
      </div>
    </div>`;
  list.appendChild(div);
  setTimeout(() => document.getElementById("tname-" + id)?.focus(), 100);
}

function removeTenant(id) {
  document.getElementById("tenant-" + id)?.remove();
}

function collectTenants() {
  return Array.from(document.querySelectorAll(".tenant-row"))
    .map(row => {
      const id = row.id.replace("tenant-", "");
      return {
        name:   (document.getElementById("tname-"   + id)?.value || "").trim(),
        status:  document.getElementById("tstatus-" + id)?.value || ""
      };
    })
    .filter(t => t.name !== "");
}

function resetForm() {
  document.getElementById("familyName").value = "";
  document.getElementById("address").value    = "";
  document.getElementById("notes").value      = "";
  document.getElementById("tenantsList").innerHTML = "";
  tenantCount = 0;
  buildingStatusVal = "";
  document.getElementById("opt-cleared").className    = "status-option";
  document.getElementById("opt-notcleared").className = "status-option";
  addTenant();
  window.scrollTo(0, 0);
}

// Listen for iframe load = submission complete
document.getElementById("hidden_iframe").addEventListener("load", function() {
  if (!submitting) return;
  submitting = false;
  const btn = document.getElementById("submitBtn");
  btn.disabled = false;
  btn.innerHTML = "שלח דיווח";
  document.getElementById("successBanner").style.display = "block"; setTimeout(() => { window.close(); }, 2500);
  document.getElementById("errorBanner").style.display   = "none";
  resetForm();
});

const savedHandler = localStorage.getItem("reporterName");
if (!savedHandler) {
  document.getElementById("setupBanner").style.display = "block";
} else {
  document.getElementById("handlerDisplay").textContent = savedHandler;
}
function saveHandlerName() {
  const name = document.getElementById("setupName").value.trim();
  if (!name) { alert("נא להכניס שם"); return; }
  localStorage.setItem("reporterName", name);
  document.getElementById("handlerDisplay").textContent = name;
  document.getElementById("setupBanner").style.display = "none";
}
function showSetup() {
  document.getElementById("setupBanner").style.display = "block";
  document.getElementById("setupName").value = localStorage.getItem("reporterName") || "";
  document.getElementById("setupName").focus();
}

function submitForm() {
  const familyName = document.getElementById("familyName").value.trim();
  const address    = document.getElementById("address").value.trim();
  const tenants    = collectTenants();

  if (!familyName) { alert("נא למלא שם משפחה"); return; }
  if (!address)    { alert("נא למלא כתובת / מספר בניין"); return; }
  if (tenants.length === 0) { alert("נא להוסיף לפחות דייר אחד עם שם"); return; }

  const buildingLabel = buildingStatusVal === "cleared" ? "נוקה" : buildingStatusVal === "notcleared" ? "טרם נוקה" : "לא צוין";
  const tenantsStr    = tenants.map(t => t.name + " – " + (STATUS_LABELS[t.status] || t.status)).join(" | ");

  // Fill hidden form
  document.getElementById("f_timestamp").value      = new Date().toLocaleString("he-IL");
  document.getElementById("f_familyName").value     = familyName;
  document.getElementById("f_address").value        = address;
  document.getElementById("f_buildingStatus").value = buildingLabel;
  document.getElementById("f_tenants").value        = tenantsStr;
  document.getElementById("f_notes").value          = document.getElementById("notes").value.trim();

  // Set form action and submit
  const form = document.getElementById("hidden_form");
  form.action = SCRIPT_URL;

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = 'שולח... <span class="spinner"></span>';
  document.getElementById("successBanner").style.display = "none";
  document.getElementById("errorBanner").style.display   = "none";

  // Submit via fetch to get ref number back
  fetch(SCRIPT_URL, { method: 'POST', body: fd })
    .then(r => r.json())
    .then(data => {
      const num = data.refNum || '?';
      document.getElementById('successBanner').innerHTML = '✅ דיווח מס׳ ' + num + ' נשמר בהצלחה!<br><span style="font-size:14px;font-weight:400">תודה רבה.</span>';
      document.getElementById('successBanner').style.display = 'block';
      document.getElementById('errorBanner').style.display = 'none';
      btn.disabled = false;
      btn.innerHTML = 'שלח דיווח';
      resetForm();
      setTimeout(() => { window.close(); }, 2500);
    })
    .catch(() => {
      document.getElementById('errorBanner').style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'שלח דיווח';
    });
  return;

  }

addTenant();
</script>
</body>
</html>
